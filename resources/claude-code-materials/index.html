<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Materials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/claude-code-materials/styles.css">
</head>
<body>

  <!-- ======== Loading Overlay ======== -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>Loading components...</p>
    </div>
  </div>

  <!-- ======== Navigation ======== -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="#" class="nav-brand">
        <div class="logo-icon">CC</div>
        <span>Claude Code Materials</span>
      </a>
      <div class="nav-search">
        <input type="text" id="global-search" placeholder="Search all components..." autocomplete="off">
      </div>
    </div>
  </nav>

  <!-- ======== Main Directory (Tabbed at Top) ======== -->
  <section class="section" id="directory">
    <!-- Tab Bar at Top -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="skills">Skills <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="agents">Agents <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="commands">Commands <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="mcps">MCPs <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="settings">Settings <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="hooks">Hooks <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="templates">Templates <span class="tab-count">0</span></button>
      <button class="tab-btn" data-tab="plugins">Plugins <span class="tab-count">0</span></button>
    </div>

    <!-- Sort Controls -->
    <div class="sort-controls">
      <label>Sort by:</label>
      <select id="sort-select">
        <option value="name-asc">Name (A-Z)</option>
        <option value="name-desc">Name (Z-A)</option>
        <option value="category-asc">Category (A-Z)</option>
        <option value="category-desc">Category (Z-A)</option>
      </select>
    </div>

    <!-- Tab Panels -->
    <div id="tab-panels">
      <div class="tab-panel active" id="panel-skills"></div>
      <div class="tab-panel" id="panel-agents"></div>
      <div class="tab-panel" id="panel-commands"></div>
      <div class="tab-panel" id="panel-mcps"></div>
      <div class="tab-panel" id="panel-settings"></div>
      <div class="tab-panel" id="panel-hooks"></div>
      <div class="tab-panel" id="panel-templates"></div>
      <div class="tab-panel" id="panel-plugins"></div>
    </div>
  </section>

  <!-- ======== Footer ======== -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <a href="#" class="nav-brand">
          <div class="logo-icon">CC</div>
          <span>Claude Code Materials</span>
        </a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>Claude Code Materials</span>
    </div>
  </footer>

  <!-- ======== Detail Modal ======== -->
  <div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal modal-large">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/claude-code-materials/app.js"></script>
</body>
</html>
